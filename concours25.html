<style>
:root{
  --bg:#f7faf9;
  --bg-tint:#eef4f2;
  --panel:#ffffff;
  --panel-2:#f3f7f6;
  --line:#e4ecea;
  --line-2:#d3e0dc;
  --ink:#102a23;
  --ink-2:#52665f;
  --ink-3:#90a39c;
  --green:#0f9d6e;
  --green-deep:#0a7d57;
  --green-soft:#e7f6f0;
  --green-line:#c7e8dc;
  --stat-green:#0fbf8a;
  --gold-soft:rgba(245,180,1,.12);
  --t1:#0f9d6e; --t1s:#e7f6f0; --t1l:#c7e8dc;
  --t2:#0d9488; --t2s:#e2f4f1; --t2l:#bfe5df;
  --t3:#3f7d6e; --t3s:#e9f1ee; --t3l:#cfe0da;
  --t4:#5b7c87; --t4s:#eaf1f3; --t4l:#cfe0e4;
  --amber:#d97706; --amber-soft:#fef3e2; --amber-line:#f6dcb0;
  --red:#dc2626; --red-soft:#fdecec; --red-line:#f6c9c9;
  --mint:#9fe3c4; --mint-soft:#d6f3e6; --mint-deep:#1d6e56;
  --beige:#f6c98a; --beige-soft:#fdedd4; --beige-line:#f3d9ab;
  --navy:#10342a;
  --radius:18px;
  --maxw:1320px;
}
[data-theme="dark"]{
  --bg:#0d1513;
  --bg-tint:#101b18;
  --panel:#152120;
  --panel-2:#1a2826;
  --line:#243431;
  --line-2:#31453f;
  --ink:#e9f2ef;
  --ink-2:#a7bab3;
  --ink-3:#728a82;
  --green:#1cc08a;
  --green-deep:#16a877;
  --green-soft:#103328;
  --green-line:#1d4d3c;
  --t1:#1cc08a; --t1s:#103328; --t1l:#1d4d3c;
  --t2:#19b4a5; --t2s:#0e3330; --t2l:#1c4d48;
  --t3:#6fb39f; --t3s:#16302a; --t3l:#244a40;
  --t4:#84a8b3; --t4s:#16282d; --t4l:#274046;
  --amber:#f59e0b; --amber-soft:#3a2c12; --amber-line:#5e4719;
  --red:#f87171; --red-soft:#3a1c1c; --red-line:#5e2a2a;
  --stat-green:#46e0ad;
  --mint:#1f7d60; --mint-soft:#143a2e; --mint-deep:#7fd9b5;
  --beige:#c98f4a; --beige-soft:#3a2c16; --beige-line:#5e4719;
  --navy:#0c2820;
}
*{margin:0;padding:0;box-sizing:border-box}
[hidden]{display:none!important}
html{scroll-behavior:smooth;overflow-x:hidden;max-width:100%}
body{font-family:'Rubik',sans-serif;background:var(--bg);color:var(--ink);line-height:1.75;overflow-x:hidden;max-width:100%;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s;font-feature-settings:"lnum"}
::selection{background:var(--green);color:#fff}

.bg-layer{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;width:100%;max-width:100vw}
.bg-orb{position:absolute;border-radius:50%;filter:blur(85px)}
.orb-1{width:480px;height:480px;background:radial-gradient(circle,rgba(15,157,110,.14),transparent 70%);top:-180px;right:-120px}
.orb-2{width:420px;height:420px;background:radial-gradient(circle,rgba(13,148,136,.11),transparent 70%);top:34%;left:-160px}
.orb-3{width:360px;height:360px;background:radial-gradient(circle,rgba(15,157,110,.08),transparent 70%);bottom:6%;right:8%}

.wrap{position:relative;z-index:1;max-width:var(--maxw);margin:0 auto;padding:0 24px}

header{position:sticky;top:0;z-index:50;backdrop-filter:blur(16px);background:var(--panel);border-bottom:1px solid var(--line);transition:background .3s,border-color .3s}
header.scrolled{background:color-mix(in srgb,var(--panel) 85%,transparent)}
.nav{max-width:var(--maxw);margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:relative}
.nav-right{flex:1 1 0;display:flex;align-items:center;justify-content:flex-end;gap:10px;min-width:0}
.brand-center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:inline-flex;align-items:center;line-height:0;text-decoration:none}
.wm{height:36px;width:auto;display:block}
.wm-dark{display:none}
[data-theme="dark"] .wm-light{display:none}
[data-theme="dark"] .wm-dark{display:block}
.theme-btn{width:40px;height:40px;border-radius:11px;flex-shrink:0;background:var(--panel-2);border:1px solid var(--line);color:var(--ink-2);display:grid;place-items:center;cursor:pointer;transition:.2s}
.theme-btn:hover{color:var(--ink);border-color:var(--line-2)}
.theme-btn svg{width:19px;height:19px}
.theme-btn .sun{display:none}
[data-theme="dark"] .theme-btn .moon{display:none}
[data-theme="dark"] .theme-btn .sun{display:block}

section{padding:56px 0;position:relative}

@media(max-width:680px){

}
@media(max-width:430px){.wm{height:21px}}

<style>
body.bac{--ln:var(--green-deep);--ln-soft:var(--green-soft);--ln-line:var(--green-line)}
body.brevet{--ln:#b9772a;--ln-soft:var(--beige-soft);--ln-line:var(--beige-line)}
body.concours{--ln:var(--t2);--ln-soft:var(--t2s);--ln-line:var(--t2l)}

.back-link{display:inline-flex;align-items:center;gap:7px;color:var(--ink-2);text-decoration:none;font-size:.88rem;font-weight:500;padding:8px 0;transition:.2s}

.back-row{max-width:560px;margin:0 auto 18px;text-align:right}

.page-hero{padding:28px 0 8px;text-align:center}

.page-sub{display:block;font-size:.6em;font-weight:500;color:var(--ink-3);letter-spacing:0;margin-top:5px}

.search-sec{padding:34px 0 60px}
.finder{max-width:560px;margin:0 auto;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:26px 24px}
.finder h3{font-size:1.1rem;font-weight:700;color:var(--ink);margin-bottom:20px;text-align:center}
.entry-row{display:flex;gap:10px;align-items:stretch}
.input-wrap{flex:1;position:relative;display:flex;align-items:center}
.input-wrap>svg{position:absolute;right:15px;width:18px;height:18px;color:var(--ink-3);pointer-events:none}
.entry-row input{width:100%;background:var(--panel-2);border:1.5px solid var(--line-2);border-radius:11px;padding:13px 44px 13px 16px;color:var(--ink);font-family:inherit;font-size:1rem;font-weight:600;transition:.2s}
.entry-row input::placeholder{color:var(--ink-3);font-weight:400;font-size:.92rem}
.entry-row input:focus{outline:none;border-color:var(--ln);background:var(--panel);box-shadow:0 0 0 3px var(--ln-soft)}
.search-btn{background:var(--ln);color:#fff;border:none;border-radius:11px;font-family:inherit;font-size:.94rem;font-weight:700;cursor:pointer;padding:0 24px;transition:.2s;display:flex;align-items:center;gap:8px;white-space:nowrap}
.search-btn:hover:not(:disabled){filter:brightness(1.08)}
.search-btn:disabled{opacity:.7;cursor:not-allowed}
.search-btn svg{width:17px;height:17px}
.btn-spin{width:17px;height:17px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:rcspin .7s linear infinite}
@keyframes rcspin{to{transform:rotate(360deg)}}

.rc{max-width:560px;margin:20px auto 0;display:none}
.rc.show{display:block;animation:rcIn .25s ease}
@keyframes rcIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--bg);font-size:.88rem;font-weight:600;padding:12px 22px;border-radius:12px;opacity:0;transition:.3s;z-index:200;pointer-events:none;box-shadow:0 12px 30px -10px rgba(0,0,0,.4)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.rc-msg{max-width:560px;margin:20px auto 0;display:none;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:30px 24px;text-align:center}
.rc-msg.show{display:block;animation:rcIn .25s ease}
.rc-msg-ic{width:56px;height:56px;border-radius:50%;margin:0 auto 14px;display:grid;place-items:center}
.rc-msg-ic svg{width:28px;height:28px}
.rc-msg.warn .rc-msg-ic{background:var(--amber-soft);color:var(--amber)}
.rc-msg.err .rc-msg-ic{background:var(--red-soft);color:var(--red)}
.rc-msg h3{font-size:1.1rem;font-weight:700;color:var(--ink);margin-bottom:7px}
.rc-msg p{font-size:.89rem;color:var(--ink-2);font-weight:400;line-height:1.7}
.rc-msg p b{color:var(--ink);font-weight:700}

/* hierarchical search */
.finder-sub{font-size:.84rem;color:var(--ink-3);text-align:center;margin-top:6px;margin-bottom:20px}
.steps-wrap{display:flex;flex-direction:column;gap:16px}
.steps-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:560px){.steps-row{grid-template-columns:1fr}}
.step-group{display:flex;flex-direction:column;gap:7px}
.step-lbl{font-size:.82rem;font-weight:600;color:var(--ink-2)}
.sel-wrap{position:relative}
.sel-wrap select{width:100%;font-family:inherit;font-size:.95rem;color:var(--ink);background:var(--panel-2);border:1.5px solid var(--line-2);border-radius:11px;padding:12px 44px 12px 16px;appearance:none;-webkit-appearance:none;cursor:pointer;transition:.2s}
.sel-wrap select:focus{outline:none;border-color:var(--ln);background:var(--panel);box-shadow:0 0 0 3px var(--ln-soft)}
.sel-wrap select:disabled{opacity:.6;cursor:default}
.sel-arrow{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--ink-3);pointer-events:none}
.student-filter{font-family:inherit;font-size:.9rem;color:var(--ink);background:var(--panel-2);border:1.5px solid var(--line-2);border-radius:11px;padding:10px 14px;width:100%;transition:.2s}
.student-filter:focus{outline:none;border-color:var(--ln);background:var(--panel);box-shadow:0 0 0 3px var(--ln-soft)}
.student-filter::placeholder{color:var(--ink-3);font-weight:400}
.student-list{border:1.5px solid var(--line-2);border-radius:11px;padding:4px}
.student-item{width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 12px;border-radius:8px;border:none;background:transparent;cursor:pointer;text-align:right;transition:.15s;font-family:inherit}
.student-item:hover{background:var(--ln-soft)}
.st-name{font-size:.88rem;font-weight:600;color:var(--ink);flex:1;min-width:0;word-break:break-word;text-align:right;line-height:1.4}
.st-num{flex-shrink:0;min-width:30px;height:24px;padding:0 7px;display:inline-flex;align-items:center;justify-content:center;border-radius:7px;background:var(--panel-2);color:var(--ink-2);border:1px solid var(--line-2);font-size:.78rem;font-weight:700;direction:ltr}
.st-total{font-size:.82rem;font-weight:700;color:var(--ink);flex-shrink:0;direction:ltr;white-space:nowrap}
.st-empty,.st-loading{padding:16px;text-align:center;color:var(--ink-3);font-size:.86rem;display:flex;align-items:center;justify-content:center;gap:8px}
.st-spin{width:16px;height:16px;border:2px solid var(--line-2);border-top-color:var(--ln);border-radius:50%;animation:rcspin .7s linear infinite;flex-shrink:0}

/* ── تصميم بطاقة الكونكور ── */
.cc-card{background:var(--panel);border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:0 8px 32px -16px rgba(16,42,35,.2)}
.cc-band{padding:52px 24px 46px;text-align:center;background:linear-gradient(135deg,var(--green),var(--green-deep));color:#fff}
.cc-score-row{display:flex;align-items:baseline;justify-content:center;direction:ltr;gap:4px}
.cc-num{font-size:3.4rem;font-weight:800;letter-spacing:-.03em;line-height:1}
.cc-denom{font-size:1.05rem;font-weight:600;opacity:.75;align-self:flex-end;padding-bottom:.35rem}
.cc-name-sec{padding:26px 24px 24px;text-align:center;border-bottom:1px solid var(--line)}
.cc-name{font-size:1.26rem;font-weight:800;color:var(--ink);line-height:1.4}
.cc-grid{display:grid;grid-template-columns:1fr 1fr;padding:4px 24px 0}
.cc-row{display:flex;flex-direction:column;gap:4px;padding:18px 0;border-bottom:1px solid var(--line)}
.cc-grid .cc-row:nth-last-child(-n+2){border-bottom:none}
.cc-lbl{font-size:.76rem;color:var(--ink-3);font-weight:500}
.cc-val{font-size:.94rem;font-weight:700;color:var(--ink)}
.cc-full{padding:0 24px 4px;border-top:1px solid var(--line)}
.cc-full .cc-row{border-bottom:none;padding:12px 0 8px}
.cc-foot{padding:18px 24px;background:var(--panel-2);display:flex;align-items:center;justify-content:center}
.cc-foot-img{height:18px;width:auto;display:block}
.cc-foot-dark{display:none}
[data-theme="dark"] .cc-foot-light{display:none}
[data-theme="dark"] .cc-foot-dark{display:block}
</style>

<script>
function applyTheme(t){if(t==='dark')document.documentElement.setAttribute('data-theme','dark');else document.documentElement.removeAttribute('data-theme');}
function toggleTheme(){const cur=document.documentElement.getAttribute('data-theme')==='dark'?'dark':'light';const next=cur==='dark'?'light':'dark';applyTheme(next);try{localStorage.setItem('theme',next);}catch(e){}}
(function(){let t=null;try{t=localStorage.getItem('theme');}catch(e){}applyTheme(t==='dark'?'dark':'light');})();
window.addEventListener('scroll',()=>{const h=document.getElementById('hdr');if(h)h.classList.toggle('scrolled',window.scrollY>10);});

/* ════════════════════════════════════════════════════════
   مصدر البيانات: ملفات JSON ثابتة في مجلد data/
   data/index.json        ← قائمة الولايات (تُحمّل عند فتح الصفحة)
   data/wilaya-N.json      ← طلاب ولاية واحدة (تُحمّل عند اختيارها)
   لا قاعدة بيانات — الملفات على شبكة Cloudflare، تتحمّل أي ضغط.
   ════════════════════════════════════════════════════════ */
const DATA_DIR='data-concours25';

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function hideAll(){document.getElementById('resultBox').classList.remove('show');document.getElementById('msgBox').classList.remove('show');}
function backToSearch(){document.getElementById('finderBox').hidden=false;document.getElementById('backRow').hidden=true;hideAll();}
function cleanDisplay(s){return(s||'').replace(/ـ/g,'').replace(/\s+/g,' ').trim();}

/* ════════ الفهرس: الولايات + كل المقاطعات بأعدادها ════════ */
let WILAYAS=[];        // [{id,wilaya,wilayaClean,count}]
let MOUGHATAS=[];      // [{m,mClean,w,wid,count}]
let _wilayaFiles={};   // الاسم الأصلي للولاية → معرّف ملفها
let _wilayaCache={};   // كاش ملفات الولايات
let _scope=[];         // طلاب المقاطعة المختارة
let _list=[];          // قائمة البحث المعروضة حالياً

function fillSelect(sel,ph){sel.innerHTML='<option value="" disabled selected>'+ph+'</option>';}

async function loadIndex(){
  const selW=document.getElementById('selWilaya');
  const selM=document.getElementById('selMoughata');
  try{
    const r=await fetch(DATA_DIR+'/index.json'); if(!r.ok)throw 0;
    const d=await r.json();
    WILAYAS=d.wilayas||[]; MOUGHATAS=d.moughatas||[];
    fillSelect(selW,'اختر الولاية');
    WILAYAS.forEach(w=>{_wilayaFiles[w.wilaya]=w.id;
      const o=document.createElement('option');o.value=w.wilaya;
      o.textContent=w.wilayaClean+' ('+w.count+')';selW.appendChild(o);});
    renderMoughataOptions(null);
  }catch(e){fillSelect(selW,'تعذّر التحميل — حدّث الصفحة');fillSelect(selM,'تعذّر التحميل');}
}

/* بناء قائمة المقاطعات: كلها أو ضمن ولاية واحدة */
function renderMoughataOptions(wilayaRaw){
  const selM=document.getElementById('selMoughata');
  const cur=selM.value;
  fillSelect(selM,'اختر المقاطعة');
  MOUGHATAS.filter(x=>!wilayaRaw||x.w===wilayaRaw).forEach(x=>{
    const o=document.createElement('option');
    o.value=x.m; o.dataset.w=x.w; o.dataset.wid=x.wid;
    o.textContent=x.mClean+' ('+x.count+')';
    if(x.m===cur)o.selected=true;
    selM.appendChild(o);
  });
}

async function fetchWilaya(wRaw){
  if(_wilayaCache[wRaw])return _wilayaCache[wRaw];
  const id=_wilayaFiles[wRaw]; if(!id)throw 0;
  const r=await fetch(DATA_DIR+'/'+id+'.json'); if(!r.ok)throw 0;
  const d=await r.json(); _wilayaCache[wRaw]=d.students; return d.students;
}

function hideCS(){document.getElementById('stepCS').hidden=true;
  fillSelect(document.getElementById('selCentre'),'اختر المركز');
  fillSelect(document.getElementById('selEcole'),'اختر المدرسة');}
function hideFinders(){document.getElementById('stepNum').hidden=true;
  const f=document.getElementById('studentFilter');if(f)f.value='';
  _list=[];hideAll();}

/* اختيار الولاية → حصر المقاطعات في هذه الولاية (والعكس مطبّق في onMoughataChange) */
function onWilayaChange(){
  const w=document.getElementById('selWilaya').value;
  hideCS();hideFinders();
  renderMoughataOptions(w);
}

/* اختيار المقاطعة → تعبئة الولاية تلقائياً + إظهار المركز/المدرسة */
async function onMoughataChange(){
  const selM=document.getElementById('selMoughata');
  const opt=selM.options[selM.selectedIndex];
  const m=selM.value; if(!m||!opt)return;
  const wRaw=opt.dataset.w;
  const selW=document.getElementById('selWilaya');
  if(selW.value!==wRaw)selW.value=wRaw;        // ← الولاية تظهر تلقائياً (مبيّن في الإكسل)
  hideCS();hideFinders();
  document.getElementById('stepCS').hidden=false;
  const selC=document.getElementById('selCentre'),selE=document.getElementById('selEcole');
  fillSelect(selC,'جارٍ التحميل…');fillSelect(selE,'جارٍ التحميل…');
  try{
    const students=await fetchWilaya(wRaw);
    _scope=students.filter(s=>s.moughata===m);
    const cMap=new Map();_scope.forEach(s=>{if(s.centre)cMap.set(s.centre,(cMap.get(s.centre)||0)+1);});
    fillSelect(selC,'اختر المركز');
    [...cMap.keys()].sort((a,b)=>cleanDisplay(a).localeCompare(cleanDisplay(b),'ar'))
      .forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=cleanDisplay(c)+' ('+cMap.get(c)+')';selC.appendChild(o);});
    const eMap=new Map();_scope.forEach(s=>{if(s.ecole)eMap.set(s.ecole,(eMap.get(s.ecole)||0)+1);});
    fillSelect(selE,'اختر المدرسة');
    [...eMap.keys()].sort((a,b)=>cleanDisplay(a).localeCompare(cleanDisplay(b),'ar'))
      .forEach(e=>{const o=document.createElement('option');o.value=e;o.textContent=cleanDisplay(e)+' ('+eMap.get(e)+')';selE.appendChild(o);});
  }catch(e){fillSelect(selC,'تعذّر التحميل');fillSelect(selE,'تعذّر التحميل');}
}

function numSort(a,b){return String(a.num||'').localeCompare(String(b.num||''),'en',{numeric:true});}

/* اختيار المركز → قائمة الطلاب مرتبة بالرقم */
function onCentreChange(){
  const c=document.getElementById('selCentre').value; if(!c)return;
  document.getElementById('selEcole').selectedIndex=0;
  hideAll();
  _list=_scope.filter(s=>s.centre===c).sort(numSort);
  document.getElementById('stepNum').hidden=false;
  document.getElementById('studentFilter').value='';
  renderStudentList(_list);
}

/* اختيار المدرسة → نفس قائمة المركز مرتبة بالرقم */
function onEcoleChange(){
  const e=document.getElementById('selEcole').value; if(!e)return;
  document.getElementById('selCentre').selectedIndex=0;
  hideAll();
  _list=_scope.filter(s=>s.ecole===e).sort(numSort);
  document.getElementById('stepNum').hidden=false;
  document.getElementById('studentFilter').value='';
  renderStudentList(_list);
}

function filterStudents(){
  const q=cleanDisplay(document.getElementById('studentFilter').value);
  if(!q){renderStudentList(_list);return;}
  renderStudentList(_list.filter(s=>cleanDisplay(s.nom||'').includes(q)||shortNum(s.num).includes(q)));
}

function shortNum(v){v=String(v==null?'':v);return v.length>3?v.slice(-3):v;}
function renderStudentList(rows){
  const list=document.getElementById('studentList');
  if(!rows.length){list.innerHTML='<div class="st-empty">لا يوجد مطابق</div>';return;}
  list.innerHTML=rows.map(s=>{
    const i=_list.indexOf(s);
    return '<button class="student-item" onclick="showStudent('+i+')">'+
      '<span class="st-num">'+esc(shortNum(s.num))+'</span>'+
      '<span class="st-name">'+esc(cleanDisplay(s.nom||'—'))+'</span>'+
      '<span class="st-total">'+(s.total!=null?s.total:'—')+'</span>'+
    '</button>';
  }).join('');
}

function showStudent(i){const r=_list[i];if(r)renderConcours(r);}

/* ── بطاقة النتيجة ── */
function renderConcours(r){
  hideAll();
  document.getElementById('finderBox').hidden=true;
  document.getElementById('backRow').hidden=false;
  const box=document.getElementById('resultBox');
  box.className='rc show';
  const totalNum=(r.total!=null&&r.total!=='')?Number(r.total):null;
  const totalStr=totalNum!=null?String(totalNum):'—';
  const wilaya=cleanDisplay(document.getElementById('selWilaya').value||'—');
  const moughata=cleanDisplay(r.moughata||'—');
  const centre=cleanDisplay(r.centre||'—');
  const ecole=cleanDisplay(r.ecole||'—');
  const num=shortNum(r.num)||'—';
  function cell(lbl,val){return'<div class="cc-row"><span class="cc-lbl">'+lbl+'</span><span class="cc-val">'+esc(val||'—')+'</span></div>';}
  box.innerHTML=
    '<div class="cc-card" id="rcCard">'+
      '<div class="cc-band">'+
        '<div class="cc-score-row"><span class="cc-num">'+totalStr+'</span><span class="cc-denom">/ 200</span></div>'+
      '</div>'+
      '<div class="cc-name-sec"><div class="cc-name">'+esc(cleanDisplay(r.nom||'—'))+'</div></div>'+
      '<div class="cc-grid">'+
        cell('الرقم',num)+
        cell('الولاية',wilaya)+
        cell('المقاطعة',moughata)+
        cell('المركز',centre)+
      '</div>'+
      '<div class="cc-full">'+cell('المدرسة',ecole)+'</div>'+
      '<div class="cc-foot"><img class="cc-foot-img cc-foot-light" alt="maurinote" src="'+RC_LOGO_LIGHT+'"><img class="cc-foot-img cc-foot-dark" alt="maurinote" src="'+RC_LOGO_DARK+'"></div>'+
    '</div>'+
    '';
  box.scrollIntoView({behavior:'smooth',block:'center'});
}
